<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MovieHub - 影视资源分发站</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    .card {
      background: rgba(255,255,255,0.95);
      border-radius: 24px;
      padding: 40px;
      text-align: center;
      max-width: 480px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    .card h1 {
      font-size: 28px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
    }
    .card .subtitle {
      color: #888;
      font-size: 14px;
      margin-bottom: 30px;
    }
    .qr-wrapper {
      background: #fff;
      border-radius: 16px;
      padding: 20px;
      display: inline-block;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    }
    .qr-wrapper img {
      display: block;
      width: 260px;
      height: 260px;
    }
    .url-box {
      margin-top: 24px;
      display: flex;
      gap: 8px;
      align-items: center;
      justify-content: center;
    }
    .url-box input {
      flex: 1;
      padding: 12px 16px;
      border: 2px solid #e0e0e0;
      border-radius: 12px;
      font-size: 14px;
      color: #333;
      background: #f8f8f8;
      outline: none;
      text-align: center;
    }
    .url-box button {
      padding: 12px 20px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: #fff;
      font-size: 14px;
      cursor: pointer;
      font-weight: 600;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .url-box button:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 15px rgba(102,126,234,0.4);
    }
    .url-box button:active {
      transform: translateY(0);
    }
    .tip {
      margin-top: 16px;
      color: #aaa;
      font-size: 12px;
    }
    .stats {
      margin-top: 24px;
      display: flex;
      justify-content: center;
      gap: 24px;
    }
    .stat {
      text-align: center;
    }
    .stat .num {
      font-size: 24px;
      font-weight: 700;
      color: #333;
    }
    .stat .label {
      font-size: 12px;
      color: #999;
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>MovieHub 影视站</h1>
    <p class="subtitle">扫码即达，随时随地看片</p>
    
    <div class="qr-wrapper">
      <img id="qrcode" src="" alt="QR Code" />
    </div>
    
    <div class="url-box">
      <input id="urlInput" type="text" readonly value="https://wxy530.github.io/movie-hub/" />
      <button onclick="copyUrl()">复制</button>
    </div>
    
    <p class="tip">扫描二维码或用手机浏览器打开上方链接</p>
    
    <div class="stats">
      <div class="stat">
        <div class="num" id="movieCount">-</div>
        <div class="label">影视资源</div>
      </div>
      <div class="stat">
        <div class="num">免费</div>
        <div class="label">观看方式</div>
      </div>
      <div class="stat">
        <div class="num">B站</div>
        <div class="label">视频来源</div>
      </div>
    </div>
  </div>

  <script>
    const url = 'https://wxy530.github.io/movie-hub/';
    const qrApi = 'https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=' + encodeURIComponent(url) + '&bgcolor=fff&color=302b63';
    document.getElementById('qrcode').src = qrApi;

    function copyUrl() {
      const input = document.getElementById('urlInput');
      input.select();
      navigator.clipboard.writeText(input.value).then(() => {
        const btn = document.querySelector('.url-box button');
        btn.textContent = '已复制!';
        setTimeout(() => { btn.textContent = '复制'; }, 2000);
      });
    }

    // 尝试获取资源数量
    fetch('js/data.js')
      .then(r => r.text())
      .then(t => {
        const matches = t.match(/id:\s*\d+/g);
        if (matches) {
          document.getElementById('movieCount').textContent = matches.length + '+';
        }
      })
      .catch(() => {
        document.getElementById('movieCount').textContent = '32+';
      });
  </script>
</body>
</html>
